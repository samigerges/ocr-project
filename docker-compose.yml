services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - paddleocr_cache:/root/.paddleocr
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - paddleocr_cache:/root/.paddleocr
    # warmup ثم start worker
    command: sh -lc "python workers/warmup.py && python workers/worker.py"
    depends_on:
      - redis

  ui:
    image: node:20-alpine
    working_dir: /ui
    volumes:
      - ./ui:/ui
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  paddleocr_cache: